<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CricOracle Preview | Dark Carbon Glow</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #070707;
            --primary-emerald: #10B981;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-glow: 0 0 15px rgba(16, 185, 129, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: #e0e0e0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(16, 185, 129, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 255, 255, 0.03) 0%, transparent 40%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900;
            font-size: 2.5rem;
            letter-spacing: -0.05em;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--primary-emerald);
            text-shadow: var(--text-glow);
        }

        .chip {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            font-weight: 700;
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary-emerald);
            padding: 4px 12px;
            border-radius: 99px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(60px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 32px;
            margin-bottom: 30px;
            transition: border-color 0.3s ease;
        }

        .card:hover { border-color: rgba(16, 185, 129, 0.3); }

        .selector-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 20px;
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
        }

        .input-group label {
            display: block;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.2em;
            margin-bottom: 8px;
        }

        .input-group select, .input-group input {
            background: transparent;
            border: none;
            color: white;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 500;
            font-size: 1.1rem;
            width: 100%;
            outline: none;
        }

        .btn-launch {
            background: white;
            color: black;
            border: none;
            padding: 0 40px;
            border-radius: 16px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-launch:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }

        .hero-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(90deg, rgba(255,255,255,0.03), transparent);
            border-radius: 40px;
            padding: 60px;
            border: 1px solid var(--glass-border);
            position: relative;
            overflow: hidden;
        }

        .team-box { text-align: center; }
        .team-flag { font-size: 4rem; margin-bottom: 10px; filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); }
        .team-name { font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 2rem; color: #fff; }

        .vs-ribbon {
            background: var(--primary-emerald);
            color: #000;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 800;
            font-size: 10px;
            letter-spacing: 0.5em;
            padding: 8px 30px;
            transform: rotate(-5deg);
            box-shadow: 0 0 40px rgba(16, 185, 129, 0.4);
        }

        .probability-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            width: 100%;
            background: rgba(255,255,255,0.05);
        }

        .probability-fill {
            height: 100%;
            width: 68%;
            background: var(--primary-emerald);
            box-shadow: 0 0 20px var(--primary-emerald);
        }

        .placeholder-text {
            color: rgba(255,255,255,0.2);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            padding: 100px 0;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">CRIC<span>ORACLE</span></div>
            <div class="chip">Neural Cluster V.4 ACTIVE</div>
        </header>

        <div class="card" style="padding: 10px;">
            <div class="selector-grid">
                <div class="input-group">
                    <label>Primary Asset</label>
                    <input type="text" placeholder="Select Team A" value="India">
                </div>
                <div class="input-group">
                    <label>Opponent Asset</label>
                    <input type="text" placeholder="Select Team B" value="Australia">
                </div>
                <div class="input-group">
                    <label>Strategic Venue</label>
                    <input type="text" placeholder="Select Ground" value="Wankhede Stadium">
                </div>
                <button class="btn-launch">Launch Engine</button>
            </div>
        </div>

        <div class="hero-banner">
            <div class="team-box">
                <div class="team-flag">🇮🇳</div>
                <div class="team-name">INDIA</div>
            </div>
            
            <div class="vs-ribbon">WIN PROBABILITY SYNC</div>

            <div class="team-box">
                <div class="team-flag">🇦🇺</div>
                <div class="team-name">AUSTRALIA</div>
            </div>

            <div class="probability-bar">
                <div class="probability-fill"></div>
            </div>
        </div>

        <div class="placeholder-text">Establishing Historical Vector...</div>
    </div>
</body>
</html>
